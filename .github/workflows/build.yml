name: Build and Release

on:
  push:
    branches:
      - master
      - preview

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Get version from build.gradle.kts
        id: get_version
        run: |
          VERSION=$(grep -oP 'versionName = "\K[^"]+' app/build.gradle.kts)
          BUILD_NUMBER=$(grep -oP 'versionCode = \K[0-9]+' app/build.gradle.kts)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION (versionCode: $BUILD_NUMBER)"

      - name: Decode keystore
        run: |
          echo "${{ secrets.SIGNING_KEYSTORE_BASE64 }}" | base64 -d > app/release.keystore

      - name: Build release APK
        env:
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Create git tag and GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.get_version.outputs.VERSION }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Create local tag (ignore error if it already exists)
          git tag "$TAG" 2>/dev/null || echo "Tag $TAG already exists locally"
          # Push tag to GitHub (ignore error if already pushed)
          git push origin "$TAG" 2>/dev/null || echo "Tag $TAG already pushed"
          # Create release, or just upload the APK if the release already exists
          gh release create "$TAG" \
            --title "haval-ev-manager-${{ steps.get_version.outputs.VERSION }}" \
            --generate-notes \
            app/build/outputs/apk/release/app-release.apk \
          || gh release upload "$TAG" \
               app/build/outputs/apk/release/app-release.apk \
               --clobber
